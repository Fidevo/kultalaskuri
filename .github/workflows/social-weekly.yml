name: 'Some: Viikkoraportti'

on:
  workflow_dispatch: # Vain manuaalinen ajo

jobs:
  weekly-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @napi-rs/canvas
        working-directory: social

      - name: Generate weekly report
        env:
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
        run: node social/scripts/weekly-post.mjs

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: social/output/weekly.png

      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/data/price-history.json
          git diff --cached --quiet || git commit -m "Hintahistoria päivitetty (viikko)"
          git push
