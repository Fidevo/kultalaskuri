name: 'Hintaseuranta: päivittäinen tallennus'

on:
  schedule:
    # Arkisin klo ~18:00 Suomen aikaa (UTC+3 = 15:00 UTC).
    # Viikonloppuna pörssi on kiinni ja hinta sama kuin perjantaina,
    # joten tallennus olisi duplikaatti — säästetään API-kutsut.
    # Minuutti 7 eikä 0: tasatunnit ruuhkautuvat GitHubin ajastimessa.
    - cron: '7 15 * * 1-5'
  workflow_dispatch: # Manuaalinen ajo

permissions:
  contents: write

jobs:
  save-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Save daily price
        env:
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
        run: node social/scripts/save-price.mjs

      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/data/price-history.json
          git diff --cached --quiet || git commit -m "Kullan hinta tallennettu"
          git push

      # Dead man's switch: pingi tulee vain jos edelliset vaiheet onnistuivat
      # (GitHub Actions pysäyttää jobin automaattisesti epäonnistuneen stepin
      # jälkeen). Jos pingi jää tulematta, healthchecks.io hälyttää sähköpostilla.
      - name: Ping healthcheck (hinta tallennettu)
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_PRICE_URL }}" || true
