name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  
  schedule:
    # Joka tunti arkisin (ma–pe). Viikonloppuna kultapörssi on kiinni
    # (pe ~24:00 UTC – su ~22:00 UTC), joten hinta ei liiku eikä buildia
    # tarvita — säästää ~192 API-kutsua/kk. Push mainiin deployaa aina.
    # Minuutti 17 eikä 0: GitHubin ajastin ruuhkautuu tasatunneilla ja
    # jättää ajoja väliin — epätyypillinen minuutti parantaa toteutumaa.
    - cron: '17 * * * 1-5'
  
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages-sha: ${{ steps.pages-sha.outputs.sha || steps.pages-sha-current.outputs.sha }}
    steps:
      # Action-versiot päivitetty 4.7.2026: GitHub pakottaa 16.6.2026 alkaen
      # actionit Node 24:lle, ja vanhat versiot kaatuivat deploy-vaiheessa.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Save daily graph price if missing
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          helsinki_hour="$(TZ=Europe/Helsinki date +%H)"
          if [ "$helsinki_hour" -ge 18 ]; then
            SAVE_PRICE_ONLY_MISSING=true node social/scripts/save-price.mjs
          else
            echo "Hintahistorian tallennus ohitetaan ennen klo 18 Suomen aikaa."
          fi
        env:
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}

      - name: Bump scheduled deploy version
        id: pages-sha
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p public
          printf '{\n  "updatedAt": "%s",\n  "runId": "%s"\n}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${GITHUB_RUN_ID}" > public/deploy-version.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/deploy-version.json
          git add social/data/price-history.json
          git commit -m "Päivitä Pages-julkaisuleima [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Use current commit for deploy version
        id: pages-sha-current
        if: github.event_name == 'push'
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
          # Runner on UTC-ajassa — aikaleimat muotoillaan Suomen ajassa
          TZ: Europe/Helsinki

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Pages-deploy epäonnistuu satunnaisesti GitHubin päässä virheeseen
      # "Deployment failed, try again later" — siksi automaattinen uusinta.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        env:
          GITHUB_SHA: ${{ needs.build.outputs.pages-sha }}

      - name: Retry deploy (1. yritys epäonnistui)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        env:
          GITHUB_SHA: ${{ needs.build.outputs.pages-sha }}

      # Dead man's switch: ilmoittaa healthchecks.io:lle onnistuneesta deploysta.
      # Jos pingi jää tulematta (esim. schedule lakkaa laukeamasta), hälytys tulee
      # sähköpostiin — muuten hinta jähmettyisi vanhaksi kenenkään huomaamatta.
      # "|| true" ettei monitoroinnin oma katkos kaada muuten onnistunutta deployta.
      - name: Ping healthcheck (deploy onnistui)
        if: steps.deployment.outcome == 'success' || steps.deployment-retry.outcome == 'success'
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_DEPLOY_URL }}" || true
