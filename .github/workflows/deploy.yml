name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  
  schedule:
    # Joka tunti arkisin (ma–pe). Viikonloppuna kultapörssi on kiinni
    # (pe ~24:00 UTC – su ~22:00 UTC), joten hinta ei liiku eikä buildia
    # tarvita — säästää ~192 API-kutsua/kk. Push mainiin deployaa aina.
    # Minuutti 17 eikä 0: GitHubin ajastin ruuhkautuu tasatunneilla ja
    # jättää ajoja väliin — epätyypillinen minuutti parantaa toteutumaa.
    - cron: '17 * * * 1-5'
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Action-versiot päivitetty 4.7.2026: GitHub pakottaa 16.6.2026 alkaen
      # actionit Node 24:lle, ja vanhat versiot kaatuivat deploy-vaiheessa.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
          # Runner on UTC-ajassa — aikaleimat muotoillaan Suomen ajassa
          TZ: Europe/Helsinki

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4