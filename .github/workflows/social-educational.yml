name: 'Some: Opettava postaus'

on:
  workflow_dispatch: # Vain manuaalinen ajo

jobs:
  educational-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @napi-rs/canvas
        working-directory: social

      - name: Generate educational post
        run: node social/scripts/educational-post.mjs

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: educational-post
          path: social/output/educational.png

      - name: Commit educational state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/data/educational-state.json
          git diff --cached --quiet || git commit -m "Opettava postaus: tila päivitetty"
          git push
